---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: "${CLUSTER_CLASS_NAME}"
spec:
  controlPlane:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: GCPKCCManagedControlPlaneTemplate
      name: "${CLUSTER_NAME}-control-plane"
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: GCPKCCManagedClusterTemplate
      name: "${CLUSTER_NAME}"
  workers:
    machinePools:
    - class: default-worker
      template:
        bootstrap:
          ref:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
            kind: GKEConfigTemplate
            name: "${CLUSTER_NAME}-pool0"
        infrastructure:
          ref:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPKCCMachinePoolTemplate
            name: "${CLUSTER_NAME}-pool0"
  variables:
  - name: project
    required: true
    schema:
      openAPIV3Schema:
        type: string
        description: GCP project ID for all resources.
  - name: region
    required: true
    schema:
      openAPIV3Schema:
        type: string
        description: GCP region for the GKE cluster and network.
  - name: machineType
    required: false
    schema:
      openAPIV3Schema:
        type: string
        default: e2-medium
        description: GCE machine type for worker nodes.
  patches:
  - name: project-and-region
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: GCPKCCManagedClusterTemplate
        matchResources:
          infrastructureCluster: true
      jsonPatches:
      - op: replace
        path: /spec/template/spec/network/metadata/annotations/cnrm.cloud.google.com~1project-id
        valueFrom:
          variable: project
      - op: replace
        path: /spec/template/spec/subnetwork/metadata/annotations/cnrm.cloud.google.com~1project-id
        valueFrom:
          variable: project
      - op: replace
        path: /spec/template/spec/subnetwork/spec/region
        valueFrom:
          variable: region
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: GCPKCCManagedControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: replace
        path: /spec/template/spec/cluster/metadata/annotations/cnrm.cloud.google.com~1project-id
        valueFrom:
          variable: project
      - op: replace
        path: /spec/template/spec/cluster/spec/location
        valueFrom:
          variable: region
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: GCPKCCMachinePoolTemplate
        matchResources:
          machinePoolClasses:
          - default-worker
      jsonPatches:
      - op: replace
        path: /spec/template/spec/nodePool/metadata/annotations/cnrm.cloud.google.com~1project-id
        valueFrom:
          variable: project
      - op: replace
        path: /spec/template/spec/nodePool/spec/location
        valueFrom:
          variable: region
  - name: machine-type
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: GCPKCCMachinePoolTemplate
        matchResources:
          machinePoolClasses:
          - default-worker
      jsonPatches:
      - op: replace
        path: /spec/template/spec/nodePool/spec/nodeConfig/machineType
        valueFrom:
          variable: machineType
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPKCCManagedClusterTemplate
metadata:
  name: "${CLUSTER_NAME}"
spec:
  template:
    spec:
      network:
        metadata:
          name: "${CLUSTER_NAME}-network"
          annotations:
            cnrm.cloud.google.com/project-id: "${GCP_PROJECT}"
        spec:
          autoCreateSubnetworks: false
          routingMode: REGIONAL
      subnetwork:
        metadata:
          name: "${CLUSTER_NAME}-subnet"
          annotations:
            cnrm.cloud.google.com/project-id: "${GCP_PROJECT}"
        spec:
          ipCidrRange: "10.0.0.0/20"
          region: "${GCP_REGION}"
          networkRef:
            name: "${CLUSTER_NAME}-network"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPKCCManagedControlPlaneTemplate
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  template:
    spec:
      cluster:
        metadata:
          name: "${CLUSTER_NAME}"
          annotations:
            cnrm.cloud.google.com/project-id: "${GCP_PROJECT}"
        spec:
          location: "${GCP_REGION}"
          initialNodeCount: 1
          removeDefaultNodePool: true
          networkRef:
            name: "${CLUSTER_NAME}-network"
          subnetworkRef:
            name: "${CLUSTER_NAME}-subnet"
          ipAllocationPolicy:
            clusterSecondaryRangeName: pods
            servicesSecondaryRangeName: services
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPKCCMachinePoolTemplate
metadata:
  name: "${CLUSTER_NAME}-pool0"
spec:
  template:
    spec:
      nodePool:
        metadata:
          name: "${CLUSTER_NAME}-pool0"
          annotations:
            cnrm.cloud.google.com/project-id: "${GCP_PROJECT}"
        spec:
          location: "${GCP_REGION}"
          clusterRef:
            name: "${CLUSTER_NAME}"
          nodeConfig:
            machineType: e2-medium
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: GKEConfigTemplate
metadata:
  name: "${CLUSTER_NAME}-pool0"
spec:
  template:
    spec: {}
