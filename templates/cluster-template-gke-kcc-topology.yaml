apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: "${CLUSTER_NAME}"
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.100.0.0/16"]
    services:
      cidrBlocks: ["10.101.0.0/16"]
  topology:
    class: "${CLUSTER_CLASS_NAME}"
    version: "${KUBERNETES_VERSION}"
    controlPlane:
      replicas: 1
    workers:
      machinePools:
      - class: default-worker
        name: mp-0
        replicas: ${WORKER_MACHINE_COUNT}
